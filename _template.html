<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
/* slidex base.css v0.3.0
 * Design guidelines compliance:
 *   - Gray + 1 accent color — accent ONLY for emphasis
 *   - NO borders — borders are noise
 *   - Light backgrounds + dark text (never dark bg + white text)
 *   - No border-radius — simple rectangular shapes only
 *   - Muted, low-saturation colors
 *   - Sufficient whitespace
 *   - Alignment, consistency, unified sizing
 *   - 1 slide = 1 message
 */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;800&display=swap');

:root {
  /* Gray palette */
  --g900: #1a1a1a;
  --g700: #404040;
  --g600: #555;
  --g500: #777;
  --g400: #999;
  --g300: #bbb;
  --g200: #d9d9d9;
  --g100: #ededed;
  --g50:  #f5f5f5;
  /* Accent: 1 color only — use sparingly, only for emphasis */
  --accent: #0070C0;
  --accent-light: #D6E4F0;
  --accent-bg: rgba(0,112,192,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
  color: var(--g700);
  background: white;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
@page { size: 297mm 210mm; margin: 0; }
@media print {
  body { background: white; margin: 0; padding: 0; }
  .slide { box-shadow: none !important; margin: 0 !important; }
}

/* ─── Slide ─── */
.slide {
  width: 297mm; height: 210mm;
  padding: 14mm 20mm 14mm;
  position: relative; overflow: hidden;
  background: #FFF;
  page-break-after: always;
}
.slide:last-child { page-break-after: avoid; }

/* Cover */
.slide-cover {
  display: flex; align-items: center;
  padding: 28mm 32mm;
}

/* Section divider */
.slide-section {
  display: flex; align-items: center; justify-content: center;
  background: var(--g50);
  color: var(--g900);
}

/* ─── Page Header (ph) ─── */
.ph {
  display: flex; align-items: baseline; gap: 3mm;
  margin-bottom: 2mm;
}
.ph-num {
  font-size: 28pt; font-weight: 800;
  color: var(--g200); line-height: 1;
}
.ph-title {
  font-size: 17pt; font-weight: 700;
  color: var(--g900); line-height: 1.3;
}
.ph-msg {
  font-size: 11pt; color: var(--g600);
  margin-bottom: 4mm; line-height: 1.7;
}
.ph-line {
  width: 100%; height: 1px;
  background: var(--g200);
  margin-bottom: 5mm;
}

/* ─── Section header ─── */
.sec {
  font-size: 12pt; font-weight: 700;
  color: var(--g900); margin-bottom: 2mm;
}
.sec-msg {
  font-size: 10.5pt; color: var(--g500);
  margin-bottom: 3mm; line-height: 1.7;
}

/* ─── Table ─── */
.tb {
  width: 100%; border-collapse: collapse;
  font-size: 10.5pt; line-height: 1.6;
}
.tb th {
  background: var(--g200); color: var(--g900);
  font-weight: 600; padding: 5px 10px;
  text-align: left; font-size: 10.5pt;
}
.tb td {
  padding: 5px 10px;
  border-bottom: 1px solid var(--g100);
  vertical-align: top;
}
.tb tr:last-child td { border-bottom: none; }
.tb .hl { background: var(--accent-bg); }
.ctb td:last-child { background: var(--accent-bg); }
.tb-s { font-size: 9pt; }
.tb-s th { font-size: 9pt; padding: 4px 8px; }
.tb-s td { padding: 4px 8px; }

/* ─── Card ─── */
.card {
  background: var(--g50); padding: 8px 14px;
}
.card-a { background: var(--accent-light); }

/* ─── Mockup ─── */
.mock {
  overflow: hidden;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  background: white;
}
.mock-bar {
  background: var(--g100); padding: 5px 10px;
  display: flex; align-items: center; gap: 4px;
  font-size: 8pt; color: var(--g500);
}
.mock-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.mock-body {
  padding: 10px 14px; background: white;
  font-size: 9pt; line-height: 1.7;
}

/* ─── Chat bubbles ─── */
.chat-u {
  background: var(--accent-light); padding: 6px 12px;
  margin-bottom: 4px;
  font-size: 9pt; color: var(--g700);
}
.chat-a {
  background: var(--g50); padding: 6px 12px;
  margin-bottom: 4px;
  font-size: 9pt;
}

/* ─── Key message ─── */
.keymsg {
  background: var(--g50);
  padding: 8px 18px; color: var(--g900);
  font-size: 11pt; text-align: center;
  font-weight: 600;
}
.keymsg em {
  color: var(--accent); font-style: normal; font-weight: 700;
}

/* ─── Pill / badge ─── */
.pill {
  display: inline-block; padding: 1px 8px;
  font-size: 9pt; font-weight: 600;
}
.pill-a { background: var(--accent-light); color: var(--accent); }
.pill-g { background: var(--g200); color: var(--g700); }
.pill-s { background: var(--g100); color: var(--g700); }

/* ─── Slide footer ─── */
.sf {
  position: absolute; bottom: 5mm; left: 20mm; right: 20mm;
  display: flex; justify-content: space-between;
  font-size: 8pt; color: var(--g400);
  border-top: 0.5px solid var(--g200); padding-top: 2mm;
}

/* ─── Architecture blocks ─── */
.arch-dk {
  background: var(--g200); color: var(--g900);
  padding: 6px 10px; text-align: center;
}
.arch-lt {
  background: var(--g50);
  padding: 6px 10px; text-align: center;
}
.arch-a {
  background: var(--accent-light);
  padding: 6px 10px; text-align: center;
}
.arch-arr {
  text-align: center; color: var(--g300);
  font-size: 12pt; line-height: 1; padding: 2px 0;
}

/* ─── Flow steps ─── */
.fstep {
  background: var(--g100); color: var(--g900);
  padding: 8px 10px;
  text-align: center; flex: 1;
}
.fstep .sn { font-size: 10pt; font-weight: 800; color: var(--g400); }
.fstep .st { font-size: 10.5pt; font-weight: 600; }
.fstep .sd { font-size: 8.5pt; color: var(--g500); margin-top: 2px; }
.fstep-hl { background: var(--accent-light); }
.fstep-hl .sn { color: var(--accent); }
.farr {
  display: flex; align-items: center;
  color: var(--g300); font-size: 18pt; padding: 0 2mm;
}

/* ─── Compare side-by-side ─── */
.cs-card {
  overflow: hidden; flex: 1;
  display: flex; flex-direction: column;
  background: var(--g50);
}
.cs-top {
  padding: 6px 12px; background: var(--g100);
}
.cs-bot {
  padding: 8px 12px; flex: 1;
}

/* ─── Pillar (3-column) ─── */
.pillar {
  flex: 1; overflow: hidden;
  display: flex; flex-direction: column;
  background: var(--g50);
}
.pillar-head {
  padding: 6px 12px; display: flex;
  align-items: center; gap: 6px;
  background: var(--g200); color: var(--g900);
}
.pillar-body { padding: 10px 12px; flex: 1; }

/* ─── Icon circle ─── */
.ic {
  width: 24px; height: 24px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11pt; flex-shrink: 0;
  background: var(--g200); color: var(--g700);
}

/* ─── Step rows (roadmap) ─── */
.step-row { display: flex; align-items: stretch; gap: 0; }
.step-num {
  width: 30mm; background: var(--g200);
  padding: 6px 10px; display: flex;
  align-items: center; gap: 4px; color: var(--g900);
}
.step-num .snum { font-size: 18pt; font-weight: 800; color: var(--g400); }
.step-content {
  flex: 1; padding: 6px 12px;
  background: var(--g50);
  display: flex; align-items: center;
}
.step-row + .step-row .step-num { border-top: 1px solid white; }
.step-row + .step-row .step-content { border-top: 1px solid var(--g200); }
.step-row.step-hl .step-num { background: var(--accent-light); }
.step-row.step-hl .step-content { background: var(--accent-bg); }
.step-row.step-hl .snum { color: var(--accent); }

/* ─── Outline / list (om) ─── */
.om { display: flex; flex-direction: column; gap: 3mm; }
.om-item {
  display: flex; overflow: hidden;
  background: var(--g50);
}
.om-label {
  width: 28mm; min-width: 28mm;
  background: var(--g200); color: var(--g900);
  font-size: 11pt; font-weight: 600;
  padding: 8px 10px;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
}
.om-body {
  flex: 1; padding: 8px 16px;
  font-size: 10.5pt; line-height: 1.7;
}

/* ─── Numbered row (nrow) ─── */
.nrow {
  display: flex; align-items: baseline;
  gap: 3mm; margin-bottom: 4mm;
}
.nrow-num {
  font-size: 22pt; font-weight: 800;
  color: var(--g200); line-height: 1; min-width: 12mm;
}
.nrow-title { font-size: 12pt; font-weight: 700; color: var(--g900); }
.nrow-body { font-size: 10.5pt; color: var(--g500); margin-top: 1mm; }

/* ─── Before/After compare boxes ─── */
.ba-box {
  flex: 1; overflow: hidden;
  display: flex; flex-direction: column;
}
.ba-head {
  padding: 6px 12px; text-align: center;
}
.ba-head-before { background: var(--g200); color: var(--g900); }
.ba-head-after { background: var(--accent-light); color: var(--accent); }
.ba-body {
  padding: 10px 14px; flex: 1;
  display: flex; flex-direction: column; justify-content: center; gap: 3mm;
}
.ba-body-before { background: var(--g50); }
.ba-body-after { background: var(--accent-bg); }

/* ─── Utility classes ─── */
.flex { display: flex; }
.g2 { gap: 2mm; } .g3 { gap: 3mm; } .g4 { gap: 4mm; } .g5 { gap: 5mm; } .g6 { gap: 6mm; }
.f1 { flex: 1; }
.fw5 { font-weight: 500; } .fw6 { font-weight: 600; } .fw7 { font-weight: 700; }
.fs8 { font-size: 8pt; } .fs85 { font-size: 8.5pt; } .fs9 { font-size: 9pt; }
.fs10 { font-size: 10.5pt; } .fs11 { font-size: 11pt; } .fs12 { font-size: 12pt; }
.fs13 { font-size: 13pt; } .fs14 { font-size: 14pt; }
.c9 { color: var(--g900); } .c7 { color: var(--g700); } .c5 { color: var(--g500); }
.c4 { color: var(--g400); } .ca { color: var(--accent); } .cw { color: white; }
.mb1 { margin-bottom: 1mm; } .mb2 { margin-bottom: 2mm; }
.mb3 { margin-bottom: 3mm; } .mb4 { margin-bottom: 4mm; } .mb5 { margin-bottom: 5mm; }
.mt1 { margin-top: 1mm; } .mt2 { margin-top: 2mm; }
.mt3 { margin-top: 3mm; } .mt4 { margin-top: 4mm; }
.ctr { text-align: center; } .aic { align-items: center; } .aist { align-items: stretch; }
</style>
</head>
<body>
<!-- SLIDE -->
</body>
</html>
